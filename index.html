<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div align="center">
        <h1>Registration Form</h1>
        <form>
            <label>Firstname: </label>
            <input type="text" id="firstname"  placeholder="Enter Firstname">
            <i id="errFirstname" class="errors"></i>
            <br>
            <br>
            <label>Lastname: </label>
            <input type="text" id="lastname" placeholder="Enter Lastname">
            <i id="errLastname" class="errors" ></i>
            <br>
            <br>
            <label>Email: </label>
            <input type="text" id="email"  placeholder="Enter Email">
            <i id="errEmail" class="errors"></i>
            <br>
            <br>
            <label>Password: </label>
            <input type="password" id="password"  placeholder="Enter Password">
            <i id="errPassword" class="errors"></i>
            <br>
            <br>

            <button type="submit">Register</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
